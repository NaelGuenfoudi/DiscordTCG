services:
  bot:
    build: .
    container_name: marketplace-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - ./marketplace.db:/app/marketplace.db
      - ./bot.log:/app/bot.log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
